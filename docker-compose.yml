# Phase 0 scaffold: API + Postgres + Redis, wired up so `docker-compose up`
# brings all three up and the API's /health endpoint responds. No schema/
# migrations yet (Phase 1) — Postgres starts as an empty, credentialed
# instance only.
#
# Config comes from a root .env file — copy .env.example to .env first.
# Never hardcode credentials here.

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-180d}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      # Postgres 18's official image changed convention: a single mount at
      # /var/lib/postgresql (not .../data) so it can manage a
      # version-specific subdirectory itself (pg_ctlcluster-style), enabling
      # a future in-place major-version upgrade via `pg_upgrade --link`.
      # Mounting at .../data (the pre-18 convention) makes the image refuse
      # to start. See https://github.com/docker-library/postgres/pull/1259.
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    # No named volume: per docs/adr/0002-data-model.md, Redis here is a
    # cache/accelerator over Postgres, never the source of truth — it's
    # meant to be safe to lose and rebuild, so we don't pretend otherwise
    # by persisting it.

  lab-access:
    build:
      context: ./tools/lab-access
      dockerfile: Dockerfile
    # network_mode: host (Linux-only) instead of a published port: this
    # tool's whole job is auto-detecting the machine's real LAN IP via
    # os.networkInterfaces() so a phone on the same Wi-Fi can reach Expo.
    # Docker's default bridge network puts it in its own network
    # namespace instead, where it would only see the container's private
    # docker0/eth0 address -- and since that interface is *named* eth0,
    # this tool's own "looks like Wi-Fi" heuristic would silently treat it
    # as correct, handing out a QR code no phone could ever reach. Host
    # networking is what makes it see the same interfaces as when this
    # tool is run manually with `pnpm run dev`. Only this one small dev
    # tool uses host networking -- api/postgres/redis stay on the
    # isolated default bridge network.
    network_mode: host
    restart: unless-stopped
    # Standalone dev/demo tool (see tools/lab-access/README.md) -- it
    # tolerates the API or Expo not being up yet (shows a red status dot
    # instead), so it doesn't need to wait on api's healthcheck.

volumes:
  postgres_data:
