name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend-test:
    name: Backend lint, build, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    # Phase 1's e2e suite exercises real Postgres/Redis writes (streak/team-
    # pool transactions), not just a stub — so CI needs the same two
    # datastores docker-compose.yml provides locally, as service containers.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d app_dev"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://app:app@localhost:5432/app_dev
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-only-test-secret
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          # pnpm/action-setup auto-detects the version from a root
          # package.json's "packageManager" field — but our Node project
          # lives in backend/, not the repo root (defaults.run.working-directory
          # only applies to `run:` steps, not `uses:` actions), so it can't
          # auto-detect here. Pinned to match backend/package.json's
          # packageManager pin.
          version: 11.9.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build

      - name: Run migrations
        run: pnpm run migration:run

      - name: Unit tests
        run: pnpm test

      - name: E2E tests
        run: pnpm run test:e2e

  docker-build:
    name: Backend Docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t skillstreak-api:ci ./backend

  compose-smoke-test:
    name: docker-compose smoke test
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v4

      - name: Prepare env file
        run: cp .env.example .env

      - name: Start stack
        run: docker compose up -d --build

      - name: Wait for API health check
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/health; then
              echo "API is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "API did not become healthy in time"
          docker compose logs
          exit 1

      - name: Tear down stack
        if: always()
        run: docker compose down -v
