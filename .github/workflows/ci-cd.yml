name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend-test:
    name: Backend lint, build, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    # Phase 1's e2e suite exercises real Postgres/Redis writes (streak/team-
    # pool transactions), not just a stub — so CI needs the same two
    # datastores docker-compose.yml provides locally, as service containers.
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d app_dev"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://app:app@localhost:5432/app_dev
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-only-test-secret
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          # pnpm/action-setup auto-detects the version from a root
          # package.json's "packageManager" field — but our Node project
          # lives in backend/, not the repo root (defaults.run.working-directory
          # only applies to `run:` steps, not `uses:` actions), so it can't
          # auto-detect here. Pinned to match backend/package.json's
          # packageManager pin.
          version: 11.9.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build

      - name: Run migrations
        run: pnpm run migration:run

      - name: Unit tests
        run: pnpm test

      - name: E2E tests
        run: pnpm run test:e2e

  docker-build:
    name: Backend Docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t skillstreak-api:ci ./backend

  compose-smoke-test:
    name: docker-compose smoke test
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v4

      - name: Prepare env file
        run: cp .env.example .env

      - name: Start stack
        run: docker compose up -d --build

      - name: Wait for API health check
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/health; then
              echo "API is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "API did not become healthy in time"
          docker compose logs
          exit 1

      - name: Tear down stack
        if: always()
        run: docker compose down -v
  deploy:
    name: Deploy to Kubernetes Cluster
    runs-on: ubuntu-latest
    # 1. ONLY run this job if the tests AND the smoke tests pass perfectly
    needs: [backend-test, compose-smoke-test]
    # 2. ONLY run this job if the code is being merged/pushed into main (not on open PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # 1. New Step: Force your username to lowercase so Docker registry doesn't crash
      - name: Downcase repository owner for Docker
        run: |
          echo "LOWER_IMAGE=ghcr.io/${OWNER,,}/skillstreak-api" >> $GITHUB_ENV
        env:
          OWNER: ${{ github.repository_owner }}

      # 2. Inject Secrets securely (Our previous fix)
      - name: Inject Production Secrets
        env:
          PROD_SECRETS: ${{ secrets.SKILLSTREAK_SECRET_YAML }}
        run: |
          printf '%s\n' "$PROD_SECRETS" > k8s/secret.yaml

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. Build using the new lowercase environment variable
      - name: Build and Push Production Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.LOWER_IMAGE }}:${{ github.sha }}

      # 4. Update the manifest using the new lowercase environment variable
      - name: Update Deployment Image Tag
        run: |
          FULL_IMAGE_URL="${{ env.LOWER_IMAGE }}:${{ github.sha }}"
          echo "Replacing placeholder with: $FULL_IMAGE_URL"
          sed -i "s|image: skillstreak-api:latest|image: $FULL_IMAGE_URL|g" k8s/api-deployment.yaml

      - name: Set Kubernetes Context
        uses: azure/k8s-set-context@v4
        with:
          method: service-account
          k8s-url: ${{ secrets.KUBE_URL }}
          k8s-secret: ${{ secrets.KUBE_TOKEN }}

      - name: Deploy Manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secret.yaml
          kubectl apply -f k8s/postgres-pvc.yaml
          kubectl apply -f k8s/postgres-service.yaml
          kubectl apply -f k8s/redis-service.yaml
          kubectl apply -f k8s/api-service.yaml
          kubectl apply -f k8s/ingress.yaml
          kubectl apply -f k8s/postgres-deployment.yaml
          kubectl apply -f k8s/redis-deployment.yaml
          kubectl apply -f k8s/api-deployment.yaml

      - name: Verify Rollout Status
        run: |
          kubectl rollout status deployment/postgres -n skillstreak
          kubectl rollout status deployment/redis -n skillstreak
          kubectl rollout status deployment/api -n skillstreak