name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend-test:
    name: Backend lint, build, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    # Phase 1's e2e suite exercises real Postgres/Redis writes (streak/team-
    # pool transactions), not just a stub — so CI needs the same two
    # datastores docker-compose.yml provides locally, as service containers.
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d app_dev"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://app:app@localhost:5432/app_dev
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-only-test-secret
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          # pnpm/action-setup auto-detects the version from a root
          # package.json's "packageManager" field — but our Node project
          # lives in backend/, not the repo root (defaults.run.working-directory
          # only applies to `run:` steps, not `uses:` actions), so it can't
          # auto-detect here. Pinned to match backend/package.json's
          # packageManager pin.
          version: 11.9.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build

      - name: Run migrations
        run: pnpm run migration:run

      - name: Unit tests
        run: pnpm test

      - name: E2E tests
        run: pnpm run test:e2e

  docker-build:
    name: Backend Docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t skillstreak-api:ci ./backend

  compose-smoke-test:
    name: docker-compose smoke test
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v4

      - name: Prepare env file
        run: cp .env.example .env

      - name: Start stack
        run: docker compose up -d --build

      - name: Wait for API health check
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/health; then
              echo "API is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "API did not become healthy in time"
          docker compose logs
          exit 1

      - name: Tear down stack
        if: always()
        run: docker compose down -v
  deploy:
    name: Deploy to Kubernetes Cluster
    runs-on: ubuntu-latest
    # 1. ONLY run this job if the tests AND the smoke tests pass perfectly
    needs: [backend-test, compose-smoke-test]
    # 2. ONLY run this job if the code is being merged/pushed into main (not on open PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # 1. New Step: Force your username to lowercase so Docker registry doesn't crash
      - name: Downcase repository owner for Docker
        run: |
          echo "LOWER_IMAGE=ghcr.io/${OWNER,,}/skillstreak-api" >> $GITHUB_ENV
        env:
          OWNER: ${{ github.repository_owner }}

      # 2. Inject Secrets securely (Our previous fix)
      - name: Inject Production Secrets
        env:
          PROD_SECRETS: ${{ secrets.SKILLSTREAK_SECRET_YAML }}
        run: |
          printf '%s\n' "$PROD_SECRETS" > k8s/secret.yaml

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. Build using the new lowercase environment variable
      - name: Build and Push Production Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.LOWER_IMAGE }}:${{ github.sha }}

      # 4. Update the manifest using native Bash environment variables
      - name: Update Deployment Image Tag
        run: |
          # By using $LOWER_IMAGE and $GITHUB_SHA, Bash reads the variables directly
          FULL_IMAGE_URL="${LOWER_IMAGE}:${GITHUB_SHA}"
          echo "Replacing placeholder with: $FULL_IMAGE_URL"
          # k8s/api-deployment.yaml's actual placeholder is a bare `image:`
          # (see the file's own header comment) — NOT the literal string
          # "image: skillstreak-api:latest" this used to look for, which
          # never matched anything and left the field empty, so every
          # deploy failed with "spec.template.spec.containers[0].image:
          # Required value". Match any `image:` line instead, and verify
          # the substitution actually landed so a future mismatch fails
          # loudly here instead of three steps later as a confusing k8s
          # validation error.
          sed -i "s|^\([[:space:]]*\)image:.*|\1image: ${FULL_IMAGE_URL}|" k8s/api-deployment.yaml
          grep -qF "image: ${FULL_IMAGE_URL}" k8s/api-deployment.yaml || {
            echo "::error::Failed to set the image on k8s/api-deployment.yaml — placeholder pattern didn't match."
            exit 1
          }

      - name: Set Kubernetes Context
        run: |
          # 1. Register your cluster URL and skip the problematic X509 certificate check
          kubectl config set-cluster skillstreak-cluster --server=${{ secrets.KUBE_URL }} --insecure-skip-tls-verify=true
          
          # 2. Assign your secure robot token
          kubectl config set-credentials github-actions-deployer --token=${{ secrets.KUBE_TOKEN }}
          
          # 3. Bind them together inside your specific namespace
          kubectl config set-context skillstreak-context --cluster=skillstreak-cluster --user=github-actions-deployer --namespace=skillstreak
          
          # 4. Activate the context
          kubectl config use-context skillstreak-context

      - name: Deploy Manifests
        run: |
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secret.yaml
          kubectl apply -f k8s/postgres-pvc.yaml
          kubectl apply -f k8s/postgres-service.yaml
          kubectl apply -f k8s/redis-service.yaml
          kubectl apply -f k8s/api-service.yaml
          kubectl apply -f k8s/ingress.yaml
          kubectl apply -f k8s/postgres-deployment.yaml
          kubectl apply -f k8s/redis-deployment.yaml
          kubectl apply -f k8s/api-deployment.yaml

      - name: Verify Rollout Status
        run: |
          kubectl rollout status deployment/postgres -n skillstreak
          kubectl rollout status deployment/redis -n skillstreak
          kubectl rollout status deployment/api -n skillstreak