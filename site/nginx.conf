# Two virtual hosts in one container, distinguished by the Host header
# ingress-nginx passes through -- both skillstreak.app2.isstech.io (the
# marketing/product page) and try.skillstreak.app2.isstech.io (the hosted
# Expo web export) point at this same Service in k8s/site-ingress.yaml.
# Combined into one image/container purely to avoid duplicating a trivial
# static-file-serving Dockerfile twice -- there's no shared state or
# runtime coupling between the two.
server {
    listen 80;
    server_name skillstreak.app2.isstech.io;
    root /usr/share/nginx/marketing;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}

server {
    listen 80 default_server;
    server_name try.skillstreak.app2.isstech.io;
    root /usr/share/nginx/app;
    index index.html;

    # The app is a single-screen state machine (see mobile/src/AppRoot.tsx
    # -- not a URL router), so there's no client-side routing to fall back
    # for. Static files only.
    location / {
        try_files $uri $uri/ =404;
    }
}
