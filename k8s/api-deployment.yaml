# NestJS API, built from backend/Dockerfile.
#
# `image: ` below is a PLACEHOLDER. Building that
# Dockerfile and pushing the result to a registry the cluster can pull from
# (e.g. GHCR, Docker Hub, a private registry) is a CI/CD step not covered by
# these manifests — swap in the real `registry/repo:tag` before applying
# this file, and prefer an immutable tag (git SHA or version) over `latest`
# once that pipeline exists so rollouts are reproducible/reversible.
#
# KNOWN LIMITATION: backend/docker-entrypoint.sh runs TypeORM migrations on
# every container start before the app boots (see docs/adr/0002-data-model.md
# — schema changes go through migrations, never manual edits). That's fine
# with docker-compose's single api container, but two concurrent replicas
# running `migration:run` on the same rollout was exactly what stalled the
# first real alpha deploy on the cluster (rollout stuck at "1 out of 2 new
# replicas" until the progress deadline). replicas is 1 here as a direct
# result of hitting that, not just a theoretical precaution — go back to 2
# only once migrations are moved into a separate Job/init step with locking
# (not solved in this cut).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: skillstreak
  labels:
    app: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image:  # PLACEHOLDER — see comment above
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: skillstreak-config
          env:
            # Individual Postgres pieces — docker-entrypoint.sh assembles
            # DATABASE_URL from these at container start (with proper
            # URL-encoding of user/password) rather than a raw
            # $(POSTGRES_USER):$(POSTGRES_PASSWORD)@... string interpolated
            # here, since a real generated password can contain characters
            # that aren't valid unescaped in a URL (this broke every
            # deploy with "Invalid URL" until fixed — see that script's
            # comment). The API itself still only ever reads DATABASE_URL
            # (see backend/src/config/env.validation.ts).
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: skillstreak-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: skillstreak-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: skillstreak-config
                  key: POSTGRES_DB
            - name: POSTGRES_HOST
              value: "postgres"
            - name: POSTGRES_PORT
              value: "5432"
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: skillstreak-secret
                  key: JWT_SECRET
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: skillstreak-secret
                  key: SMTP_USER
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: skillstreak-secret
                  key: SMTP_PASSWORD
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
