# Non-secret API configuration. Pair with secret.yaml (copied from
# secret.yaml.example) for the values that actually need to stay private.
#
# These are beta-deployment defaults mirroring backend/.env.example and
# docker-compose.yml — adjust per environment as needed (e.g. a real
# Postgres DB/user name instead of the dev-era "app_dev"/"app").
apiVersion: v1
kind: ConfigMap
metadata:
  name: skillstreak-config
  namespace: skillstreak
data:
  NODE_ENV: "production"
  PORT: "3000"
  POSTGRES_DB: "app_dev"
  # Not sensitive on its own — pairs with POSTGRES_PASSWORD in secret.yaml.
  POSTGRES_USER: "app"
  JWT_EXPIRES_IN: "180d"
  SMTP_HOST: "smtp-relay.gmail.com"
  SMTP_PORT: "587"
  SMTP_FROM: "SkillStreak <noreply@yourdomain.example>"
  # Alpha-test value, NOT the real beta domain. This cluster currently has
  # no working external ingress path (LoadBalancer Services can't get an
  # IP — the cloud-controller-manager here runs with the service-lb
  # controller disabled — and the cluster's one public IP only serves the
  # k8s API on :6443, nothing on :80/:443). Until that's resolved, alpha
  # access is via `kubectl port-forward svc/api 3000:80 -n skillstreak`,
  # so this must match that port. Parental-consent email links point here
  # — do NOT let real parent-facing emails go out until this is a real,
  # TLS-covered public domain again (see ingress.yaml/site-ingress.yaml,
  # currently not applied for the same reason, and the warning in
  # k8s/README.md about the consent token being a bearer credential).
  APP_PUBLIC_URL: "http://localhost:3000"
  # Fas 3 (docs/adr/0010-video-storage-and-serving.md) — the in-cluster
  # MinIO Service (minio-service.yaml), never a public endpoint.
  MINIO_ENDPOINT: "http://minio:9000"
  MINIO_BUCKET: "clips"
  # Tunable product config (ADR-0010 Decision 5), not architecturally
  # fixed — see that ADR's own "flagged, not silently decided as final"
  # framing for these two numbers.
  CLIP_RETENTION_DAYS: "90"
  CLIP_PENDING_UPLOAD_TTL_MINUTES: "60"
