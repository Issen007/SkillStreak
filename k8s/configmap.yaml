# Non-secret API configuration. Pair with secret.yaml (copied from
# secret.yaml.example) for the values that actually need to stay private.
#
# These are beta-deployment defaults mirroring backend/.env.example and
# docker-compose.yml — adjust per environment as needed (e.g. a real
# Postgres DB/user name instead of the dev-era "app_dev"/"app").
apiVersion: v1
kind: ConfigMap
metadata:
  name: skillstreak-config
  namespace: skillstreak
data:
  NODE_ENV: "production"
  PORT: "3000"
  POSTGRES_DB: "app_dev"
  # Not sensitive on its own — pairs with POSTGRES_PASSWORD in secret.yaml.
  POSTGRES_USER: "app"
  JWT_EXPIRES_IN: "180d"
  SMTP_HOST: "smtp-relay.gmail.com"
  SMTP_PORT: "587"
  SMTP_FROM: "SkillStreak <noreply@yourdomain.example>"
  # Real beta API domain, matching ingress.yaml's host (the api subdomain,
  # not the root domain — see site-ingress.yaml for what the root domain
  # serves now). Parental-consent email links point here — do NOT let real
  # parent-facing emails go out (MailService actually sending, not just
  # this being applied) until ingress.yaml's cert-manager annotation has
  # been switched from `letsencrypt-staging` to `letsencrypt-prod` and
  # confirmed Ready; until then this domain is only reachable with an
  # untrusted-by-default cert.
  APP_PUBLIC_URL: "https://api.skillstreak.app2.isstech.io"
